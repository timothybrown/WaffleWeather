name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write
  packages: write

env:
  REGISTRY: ghcr.io

jobs:
  validate:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.check.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Validate tag matches source versions
        id: check
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          BACKEND=$(python3 -c "
          import tomllib
          with open('backend/pyproject.toml', 'rb') as f:
              print(tomllib.load(f)['project']['version'])
          ")
          FRONTEND=$(node -p "require('./frontend/package.json').version")

          echo "Tag: $TAG_VERSION"
          echo "Backend: $BACKEND"
          echo "Frontend: $FRONTEND"

          if [ "$TAG_VERSION" != "$BACKEND" ] || [ "$TAG_VERSION" != "$FRONTEND" ]; then
            echo "::error::Version mismatch: tag=$TAG_VERSION backend=$BACKEND frontend=$FRONTEND"
            exit 1
          fi

          echo "version=$TAG_VERSION" >> "$GITHUB_OUTPUT"

  build-backend:
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/backend/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/waffleweather-backend:${{ needs.validate.outputs.version }}
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/waffleweather-backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-frontend:
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/frontend/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/waffleweather-frontend:${{ needs.validate.outputs.version }}
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/waffleweather-frontend:latest
          build-args: |
            NEXT_PUBLIC_API_URL=
            NEXT_PUBLIC_WS_URL=
          cache-from: type=gha
          cache-to: type=gha,mode=max

  release:
    needs: [validate, build-backend, build-frontend]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          generate_release_notes: true
