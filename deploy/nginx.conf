# WaffleWeather Nginx site configuration
# Installed to /etc/nginx/sites-available/waffleweather
#
# This is a PUBLIC reference file. Replace the placeholder values (in angle
# brackets) before deploying:
#   <your-lan-hostname>      e.g., weatherpi.local (mDNS/Bonjour name)
#   <your-public-hostname>   e.g., weather.example.com or a Tailscale *.ts.net name
#   <path-to-cert.crt>       path to TLS certificate (e.g., Tailscale-issued or Let's Encrypt)
#   <path-to-cert.key>       path to TLS private key

# ---------------------------------------------------------------------------
# Rate-limit zones (http scope)
#
# On Debian, nginx.conf's http { } block is what includes this site file via
# /etc/nginx/sites-enabled/. Since `limit_req_zone` is an http-scope directive,
# it cannot live inside a server { } block. In production these two lines
# live in a dedicated file at /etc/nginx/conf.d/zz-waffleweather-ratelimit.conf
# (which nginx.conf pulls in via `include /etc/nginx/conf.d/*.conf`).
#
# They are shown here (commented) so this reference file is self-documenting.
# If you copy this file onto a host that does NOT already have the zones in
# http scope, uncomment and move these into nginx.conf's http { } block or
# into /etc/nginx/conf.d/zz-waffleweather-ratelimit.conf:
#
# limit_req_zone $binary_remote_addr zone=waffle_api:10m rate=30r/s;
# limit_req_zone $binary_remote_addr zone=waffle_ws:10m rate=5r/s;
# ---------------------------------------------------------------------------

# ---------------------------------------------------------------------------
# Gzip compression (http scope)
#
# Lives in nginx.conf's http { } block in production. Debian's default ships
# `gzip on;` but nothing else — we expand types/min_length/vary/comp_level.
# Shown here commented for reference; configure on your host directly in
# /etc/nginx/nginx.conf:
#
# gzip on;
# gzip_comp_level 5;
# gzip_min_length 256;
# gzip_vary on;
# gzip_proxied any;
# gzip_types
#     text/plain text/css text/javascript
#     application/javascript application/json application/xml
#     image/svg+xml font/woff2;
# ---------------------------------------------------------------------------

# ---------------------------------------------------------------------------
# Block 1: LAN HTTP access
#
# LAN hostnames (e.g., *.local mDNS names) typically don't have a public
# HTTPS cert, so blanket-redirecting all HTTP to HTTPS breaks LAN access.
# This block proxies HTTP directly for the LAN hostname. Omit this block
# if your deployment is HTTPS-only.
# ---------------------------------------------------------------------------
server {
    listen 80;
    server_name <your-lan-hostname>;

    # API key injection (file not in repo — create it yourself):
    #   $ sudo -e /etc/nginx/snippets/waffleweather-apikey.conf
    #   (single line:  set $ww_api_key "your-key-here";)
    include /etc/nginx/snippets/waffleweather-apikey.conf;

    # Security headers (HSTS intentionally omitted — HTTP only)
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
    add_header Content-Security-Policy "default-src 'self'; img-src 'self' data: blob: https://*.basemaps.cartocdn.com; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; font-src 'self' data:; connect-src 'self'; worker-src 'self' blob:; manifest-src 'self'" always;

    location /api/ {
        limit_req zone=waffle_api burst=60 nodelay;
        limit_req_status 429;
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-API-Key $ww_api_key;
    }

    location /ws/ {
        limit_req zone=waffle_ws burst=10 nodelay;
        limit_req_status 429;
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-API-Key $ww_api_key;
        proxy_read_timeout 86400;
    }

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# ---------------------------------------------------------------------------
# Block 2: HTTP -> HTTPS redirect (default catch-all)
#
# Any HTTP request not matched by the LAN block above (including the public
# hostname, direct IP access, etc.) gets a 301 to HTTPS. $host preserves
# whatever hostname the client used.
# ---------------------------------------------------------------------------
server {
    listen 80 default_server;
    server_name _;

    return 301 https://$host$request_uri;
}

