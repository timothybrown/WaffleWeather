# ---------------------------------------------------------------------------
# Block 3 (optional): HTTP -> HTTPS redirect for public hostnames
#
# Uncomment AFTER configuring Block 2. If you have a LAN hostname without
# a public TLS cert, change Block 1's `server_name _;` to your LAN hostname
# so LAN access stays over HTTP; this redirect will then only catch the
# public hostname + direct IP access.
# ---------------------------------------------------------------------------
#
# server {
#     listen 80 default_server;
#     server_name _;
#
#     return 301 https://$host$request_uri;
# }
