# WaffleWeather Nginx site configuration
# Installed to /etc/nginx/sites-available/waffleweather
#
# This file is a PUBLIC reference. It ships configured for HTTP-only
# operation so a fresh install works immediately. No HTTPS is enforced
# by default.
#
# To enable HTTPS:
#   1. Uncomment Block 2 (HTTPS server) below and fill in <your-public-hostname>
#      + cert paths.
#   2. If you want HTTP requests to redirect to HTTPS, uncomment Block 3.
#   3. If you ALSO have a LAN hostname without a public TLS cert (e.g. an
#      mDNS name like weatherpi.local), change Block 1's `server_name` to
#      your LAN hostname (instead of `_`) so LAN access stays over HTTP,
#      and Block 3's redirect only catches the public hostname + IP access.
#
# The default shape (Block 1 only) also suits deployments where HTTPS is
# terminated upstream (reverse proxy, load balancer, Tailscale Serve, etc.).

# ---------------------------------------------------------------------------
# Rate-limit zones (http scope)
#
# On Debian, nginx.conf's http { } block is what includes this site file via
# /etc/nginx/sites-enabled/. Since `limit_req_zone` is an http-scope directive,
# it cannot live inside a server { } block. In production these two lines
# live in a dedicated file at /etc/nginx/conf.d/zz-waffleweather-ratelimit.conf
# (which nginx.conf pulls in via `include /etc/nginx/conf.d/*.conf`).
#
# They are shown here (commented) so this reference file is self-documenting.
# If you copy this file onto a host that does NOT already have the zones in
# http scope, uncomment and move these into nginx.conf's http { } block or
# into /etc/nginx/conf.d/zz-waffleweather-ratelimit.conf:
#
# limit_req_zone $binary_remote_addr zone=waffle_api:10m rate=30r/s;
# limit_req_zone $binary_remote_addr zone=waffle_ws:10m rate=5r/s;
# ---------------------------------------------------------------------------

# ---------------------------------------------------------------------------
# Gzip compression (http scope)
#
# Lives in nginx.conf's http { } block in production. Debian's default ships
# `gzip on;` but nothing else — we expand types/min_length/vary/comp_level.
# Shown here commented for reference; configure on your host directly in
# /etc/nginx/nginx.conf:
#
# gzip on;
# gzip_comp_level 5;
# gzip_min_length 256;
# gzip_vary on;
# gzip_proxied any;
# gzip_types
#     text/plain text/css text/javascript
#     application/javascript application/json application/xml
#     image/svg+xml font/woff2;
# ---------------------------------------------------------------------------

# ---------------------------------------------------------------------------
# Block 1: HTTP server (default, works out of the box)
#
# Proxies /api/, /ws/, and the Next.js frontend directly over HTTP.
# Listens as `default_server` so it matches any hostname unless overridden.
# Change `server_name _;` to your LAN hostname if you enable Block 3's
# redirect for public hostnames (see instructions above).
# ---------------------------------------------------------------------------
server {
    listen 80 default_server;
    server_name _;

    # API key injection (file not in repo — create it yourself):
    #   $ sudo -e /etc/nginx/snippets/waffleweather-apikey.conf
    #   (single line:  set $ww_api_key "your-key-here";)
    include /etc/nginx/snippets/waffleweather-apikey.conf;

    # Security headers (HSTS intentionally omitted — only add to HTTPS blocks)
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
    add_header Content-Security-Policy "default-src 'self'; img-src 'self' data: blob: https://*.basemaps.cartocdn.com; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; font-src 'self' data:; connect-src 'self'; worker-src 'self' blob:; manifest-src 'self'" always;

    # API requests -> FastAPI/uvicorn
    location /api/ {
        limit_req zone=waffle_api burst=60 nodelay;
        limit_req_status 429;
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-API-Key $ww_api_key;
    }

    # WebSocket -> FastAPI/uvicorn
    location /ws/ {
        limit_req zone=waffle_ws burst=10 nodelay;
        limit_req_status 429;
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-API-Key $ww_api_key;
        proxy_read_timeout 86400;
    }

    # Everything else -> Next.js
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

