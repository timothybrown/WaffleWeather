# WaffleWeather Mosquitto configuration
# Installed to /etc/mosquitto/conf.d/waffleweather.conf

# MQTT listener
listener 1883

# WebSocket listener (for browser clients)
listener 9001
protocol websockets

# Authentication — require username/password
allow_anonymous false
password_file /etc/mosquitto/passwd
acl_file /etc/mosquitto/acls.conf
