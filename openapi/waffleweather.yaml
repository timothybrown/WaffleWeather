openapi: "3.1.0"
info:
  title: WaffleWeather API
  description: Modern weather station API for live and historical weather data.
  version: "1.0.0"

servers:
  - url: http://localhost:8000
    description: Local development

paths:
  /api/v1/stations:
    get:
      summary: List registered weather stations
      operationId: listStations
      tags: [stations]
      responses:
        "200":
          description: List of stations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Station"

  /api/v1/stations/{station_id}:
    get:
      summary: Get station details
      operationId: getStation
      tags: [stations]
      parameters:
        - name: station_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Station details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Station"
        "404":
          description: Station not found

  /api/v1/observations/latest:
    get:
      summary: Get the most recent observation
      operationId: getLatestObservation
      tags: [observations]
      parameters:
        - name: station_id
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: Most recent observation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Observation"
        "404":
          description: No observations found

  /api/v1/observations:
    get:
      summary: Query raw observations with time range
      operationId: listObservations
      tags: [observations]
      parameters:
        - name: station_id
          in: query
          required: false
          schema:
            type: string
        - name: start
          in: query
          required: false
          schema:
            type: string
            format: date-time
        - name: end
          in: query
          required: false
          schema:
            type: string
            format: date-time
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 100
            maximum: 10000
        - name: offset
          in: query
          required: false
          schema:
            type: integer
            default: 0
      responses:
        "200":
          description: Paginated list of observations
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ObservationPage"

  /api/v1/observations/hourly:
    get:
      summary: Hourly aggregated observations
      operationId: listHourlyObservations
      tags: [aggregates]
      parameters:
        - name: station_id
          in: query
          required: false
          schema:
            type: string
        - name: start
          in: query
          required: true
          schema:
            type: string
            format: date-time
        - name: end
          in: query
          required: true
          schema:
            type: string
            format: date-time
      responses:
        "200":
          description: Hourly aggregated observations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AggregatedObservation"

  /api/v1/observations/daily:
    get:
      summary: Daily aggregated observations
      operationId: listDailyObservations
      tags: [aggregates]
      parameters:
        - name: station_id
          in: query
          required: false
          schema:
            type: string
        - name: start
          in: query
          required: true
          schema:
            type: string
            format: date-time
        - name: end
          in: query
          required: true
          schema:
            type: string
            format: date-time
      responses:
        "200":
          description: Daily aggregated observations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AggregatedObservation"

  /api/v1/observations/monthly:
    get:
      summary: Monthly aggregated observations
      operationId: listMonthlyObservations
      tags: [aggregates]
      parameters:
        - name: station_id
          in: query
          required: false
          schema:
            type: string
        - name: start
          in: query
          required: true
          schema:
            type: string
            format: date-time
        - name: end
          in: query
          required: true
          schema:
            type: string
            format: date-time
      responses:
        "200":
          description: Monthly aggregated observations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AggregatedObservation"

  /api/v1/observations/calendar:
    get:
      summary: Daily metric values for calendar heatmap
      operationId: getCalendarData
      tags: [aggregates]
      parameters:
        - name: metric
          in: query
          required: true
          schema:
            type: string
            enum:
              - temp_outdoor_max
              - rain_daily_max
              - solar_radiation_avg
              - wind_gust_max
              - humidity_outdoor_avg
              - lightning_strikes
        - name: year
          in: query
          required: false
          schema:
            type: integer
          description: Year to query (defaults to current year)
        - name: station_id
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: Daily metric values for the year
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CalendarDataPoint"

  /api/v1/observations/lightning/events:
    get:
      summary: List lightning strike events
      operationId: listLightningEvents
      tags: [lightning]
      parameters:
        - name: start
          in: query
          required: false
          schema:
            type: string
            format: date-time
        - name: end
          in: query
          required: false
          schema:
            type: string
            format: date-time
        - name: station_id
          in: query
          required: false
          schema:
            type: string
        - name: include_filtered
          in: query
          required: false
          schema:
            type: boolean
            default: false
          description: Include events flagged as likely false positives
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 100
            maximum: 10000
        - name: offset
          in: query
          required: false
          schema:
            type: integer
            default: 0
      responses:
        "200":
          description: Paginated list of lightning events
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LightningEventPage"

  /api/v1/observations/lightning/summary:
    get:
      summary: Lightning activity summary for a time period
      operationId: getLightningSummary
      tags: [lightning]
      parameters:
        - name: start
          in: query
          required: true
          schema:
            type: string
            format: date-time
        - name: end
          in: query
          required: true
          schema:
            type: string
            format: date-time
        - name: station_id
          in: query
          required: false
          schema:
            type: string
        - name: include_filtered
          in: query
          required: false
          schema:
            type: boolean
            default: false
          description: Include events flagged as likely false positives
      responses:
        "200":
          description: Lightning activity summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LightningSummary"

  /api/v1/observations/wind-rose:
    get:
      summary: Wind rose data (direction × speed bins)
      operationId: getWindRoseData
      tags: [aggregates]
      parameters:
        - name: start
          in: query
          required: true
          schema:
            type: string
            format: date-time
        - name: end
          in: query
          required: true
          schema:
            type: string
            format: date-time
        - name: station_id
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: Wind rose bin data
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/WindRoseDataPoint"

  /api/v1/reports/monthly:
    get:
      summary: Monthly climate report (NOAA-style)
      operationId: getMonthlyReport
      tags: [reports]
      parameters:
        - name: year
          in: query
          required: true
          schema:
            type: integer
        - name: month
          in: query
          required: true
          schema:
            type: integer
        - name: station_id
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: Monthly climate report with daily rows
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClimateReport"
        "404":
          description: Station not found

  /api/v1/reports/yearly:
    get:
      summary: Yearly climate report (NOAA-style)
      operationId: getYearlyReport
      tags: [reports]
      parameters:
        - name: year
          in: query
          required: true
          schema:
            type: integer
        - name: station_id
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: Yearly climate report with monthly rows
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClimateReport"
        "404":
          description: Station not found

  /api/v1/reports/monthly/txt:
    get:
      summary: Monthly climate report as plain text (NOAA format)
      operationId: getMonthlyReportTxt
      tags: [reports]
      parameters:
        - name: year
          in: query
          required: true
          schema:
            type: integer
        - name: month
          in: query
          required: true
          schema:
            type: integer
        - name: units
          in: query
          required: false
          schema:
            type: string
            enum: [metric, imperial]
            default: metric
        - name: station_id
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: Plain-text NOAA-style report
          content:
            text/plain:
              schema:
                type: string

  /api/v1/reports/yearly/txt:
    get:
      summary: Yearly climate report as plain text (NOAA format)
      operationId: getYearlyReportTxt
      tags: [reports]
      parameters:
        - name: year
          in: query
          required: true
          schema:
            type: integer
        - name: units
          in: query
          required: false
          schema:
            type: string
            enum: [metric, imperial]
            default: metric
        - name: station_id
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: Plain-text NOAA-style report
          content:
            text/plain:
              schema:
                type: string

  /api/v1/records:
    get:
      summary: Get all station records
      operationId: getRecords
      tags: [records]
      parameters:
        - name: station_id
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: Station records grouped by category
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecordsResponse"
        "404":
          description: Station not found

  /api/v1/records/broken:
    get:
      summary: Check which all-time records were broken today
      operationId: getBrokenRecords
      tags: [records]
      parameters:
        - name: station_id
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: Broken records status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BrokenRecordsResponse"
        "404":
          description: Station not found

components:
  schemas:
    Station:
      type: object
      required: [id]
      properties:
        id:
          type: string
          description: Device MAC or ID from ecowitt2mqtt
        name:
          type: string
          nullable: true
        model:
          type: string
          nullable: true
        firmware_version:
          type: string
          nullable: true
        last_seen:
          type: string
          format: date-time
          nullable: true
        latitude:
          type: number
          nullable: true
        longitude:
          type: number
          nullable: true
        altitude:
          type: number
          nullable: true
          description: Station altitude in meters above sea level
        timezone:
          type: string
          nullable: true
          description: Station IANA timezone (e.g. "America/New_York")

    Observation:
      type: object
      required: [timestamp, station_id]
      properties:
        timestamp:
          type: string
          format: date-time
        station_id:
          type: string
        # Temperature
        temp_outdoor:
          type: number
          nullable: true
          description: Outdoor temperature (°C)
        temp_indoor:
          type: number
          nullable: true
          description: Indoor temperature (°C)
        dewpoint:
          type: number
          nullable: true
          description: Dewpoint temperature (°C)
        feels_like:
          type: number
          nullable: true
          description: Feels-like temperature (°C)
        heat_index:
          type: number
          nullable: true
          description: Heat index (°C)
        wind_chill:
          type: number
          nullable: true
          description: Wind chill (°C)
        frost_point:
          type: number
          nullable: true
          description: Frost point (°C)
        # Humidity
        humidity_outdoor:
          type: number
          nullable: true
          description: Outdoor relative humidity (%)
        humidity_indoor:
          type: number
          nullable: true
          description: Indoor relative humidity (%)
        # Pressure
        pressure_abs:
          type: number
          nullable: true
          description: Absolute barometric pressure (hPa)
        pressure_rel:
          type: number
          nullable: true
          description: Relative barometric pressure (hPa)
        # Wind
        wind_speed:
          type: number
          nullable: true
          description: Wind speed (km/h)
        wind_gust:
          type: number
          nullable: true
          description: Wind gust speed (km/h)
        wind_dir:
          type: number
          nullable: true
          description: Wind direction (degrees, 0-360)
        # Rain
        rain_rate:
          type: number
          nullable: true
          description: Rain rate (mm/h)
        rain_daily:
          type: number
          nullable: true
          description: Daily rainfall total (mm)
        rain_weekly:
          type: number
          nullable: true
          description: Weekly rainfall total (mm)
        rain_monthly:
          type: number
          nullable: true
          description: Monthly rainfall total (mm)
        rain_yearly:
          type: number
          nullable: true
          description: Yearly rainfall total (mm)
        rain_event:
          type: number
          nullable: true
          description: Event rainfall total (mm)
        # Solar / UV
        solar_radiation:
          type: number
          nullable: true
          description: Solar radiation (W/m²)
        uv_index:
          type: number
          nullable: true
          description: UV index
        # Air Quality
        pm25:
          type: number
          nullable: true
          description: PM2.5 concentration (µg/m³)
        pm10:
          type: number
          nullable: true
          description: PM10 concentration (µg/m³)
        co2:
          type: number
          nullable: true
          description: CO2 concentration (ppm)
        # Soil
        soil_moisture_1:
          type: number
          nullable: true
          description: Soil moisture channel 1 (%)
        soil_moisture_2:
          type: number
          nullable: true
          description: Soil moisture channel 2 (%)
        # Thermal — Black Globe
        bgt:
          type: number
          nullable: true
          description: Black Globe Temperature (°C)
        wbgt:
          type: number
          nullable: true
          description: Wet Bulb Globe Temperature (°C)
        vpd:
          type: number
          nullable: true
          description: Vapor Pressure Deficit (hPa)
        # Lightning
        lightning_count:
          type: integer
          nullable: true
          description: Lightning strike count
        lightning_distance:
          type: number
          nullable: true
          description: Lightning distance (km)
        lightning_time:
          type: string
          format: date-time
          nullable: true
          description: Last lightning strike time
        # Derived — thermal comfort
        utci:
          type: number
          nullable: true
          description: Universal Thermal Climate Index (°C)
        zambretti_forecast:
          type: string
          nullable: true
          description: Zambretti barometric pressure forecast

    AggregatedObservation:
      type: object
      required: [bucket, station_id]
      properties:
        bucket:
          type: string
          format: date-time
          description: Start of the time bucket
        station_id:
          type: string
        # Temperature
        temp_outdoor_avg:
          type: number
          nullable: true
        temp_outdoor_min:
          type: number
          nullable: true
        temp_outdoor_max:
          type: number
          nullable: true
        # Dewpoint
        dewpoint_avg:
          type: number
          nullable: true
        dewpoint_min:
          type: number
          nullable: true
        dewpoint_max:
          type: number
          nullable: true
        # Humidity
        humidity_outdoor_avg:
          type: number
          nullable: true
        humidity_outdoor_min:
          type: number
          nullable: true
        humidity_outdoor_max:
          type: number
          nullable: true
        # Pressure
        pressure_rel_avg:
          type: number
          nullable: true
        pressure_rel_min:
          type: number
          nullable: true
        pressure_rel_max:
          type: number
          nullable: true
        # Wind
        wind_speed_avg:
          type: number
          nullable: true
        wind_speed_max:
          type: number
          nullable: true
        wind_gust_max:
          type: number
          nullable: true
        # Rain
        rain_daily_max:
          type: number
          nullable: true
        # Solar / UV
        solar_radiation_avg:
          type: number
          nullable: true
        solar_radiation_max:
          type: number
          nullable: true
        uv_index_max:
          type: number
          nullable: true

    CalendarDataPoint:
      type: object
      required: [date]
      properties:
        date:
          type: string
          format: date
          description: Calendar date (YYYY-MM-DD)
        value:
          type: number
          nullable: true
          description: Metric value for the day

    WindRoseDataPoint:
      type: object
      required: [direction, speed_range, count]
      properties:
        direction:
          type: number
          description: Center angle of direction sector (degrees)
        speed_range:
          type: string
          description: "Speed band label (e.g. '0-5', '5-15')"
        count:
          type: integer
          description: Number of observations in this bin

    LightningEvent:
      type: object
      required: [timestamp, station_id, new_strikes, cumulative_count, filtered]
      properties:
        timestamp:
          type: string
          format: date-time
        station_id:
          type: string
        new_strikes:
          type: integer
          description: Number of new strikes detected in this interval
        distance_km:
          type: number
          nullable: true
          description: Distance to strike (km)
        cumulative_count:
          type: integer
          description: Raw sensor count at time of detection
        filtered:
          type: boolean
          description: Whether this event was flagged as a likely false positive

    LightningEventPage:
      type: object
      required: [items, total, limit, offset]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/LightningEvent"
        total:
          type: integer
        limit:
          type: integer
        offset:
          type: integer

    LightningDaily:
      type: object
      required: [date, strikes]
      properties:
        date:
          type: string
          format: date
        strikes:
          type: integer

    LightningHourly:
      type: object
      required: [bucket, strikes]
      properties:
        bucket:
          type: string
          format: date-time
        strikes:
          type: integer
        min_distance:
          type: number
          nullable: true

    LightningSummary:
      type: object
      required: [total_strikes, event_count, filtered_count, daily, hourly]
      properties:
        total_strikes:
          type: integer
        event_count:
          type: integer
        filtered_count:
          type: integer
          description: Number of filtered (likely false positive) events in the period
        closest_distance:
          type: number
          nullable: true
          description: Closest strike distance (km) in the period
        daily:
          type: array
          items:
            $ref: "#/components/schemas/LightningDaily"
        hourly:
          type: array
          items:
            $ref: "#/components/schemas/LightningHourly"

    ObservationPage:
      type: object
      required: [items, limit, offset]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/Observation"
        total:
          type: integer
          nullable: true
          description: >-
            Total number of matching observations. Only populated when
            offset>0 (pagination); null when offset=0 to skip the COUNT(*)
            hypertable scan on the hot path.
        limit:
          type: integer
        offset:
          type: integer

    StationInfo:
      type: object
      properties:
        name:
          type: string
          nullable: true
        latitude:
          type: number
          nullable: true
        longitude:
          type: number
          nullable: true
        altitude:
          type: number
          nullable: true

    ReportPeriod:
      type: object
      required: [type, year]
      properties:
        type:
          type: string
          description: "monthly or yearly"
        year:
          type: integer
        month:
          type: integer
          nullable: true

    ReportRow:
      type: object
      properties:
        day:
          type: integer
          nullable: true
        month:
          type: integer
          nullable: true
        temp_avg:
          type: number
          nullable: true
        temp_max:
          type: number
          nullable: true
        temp_min:
          type: number
          nullable: true
        dewpoint_avg:
          type: number
          nullable: true
        dewpoint_max:
          type: number
          nullable: true
        dewpoint_min:
          type: number
          nullable: true
        humidity_avg:
          type: number
          nullable: true
        pressure_avg:
          type: number
          nullable: true
        wind_speed_avg:
          type: number
          nullable: true
        wind_gust_max:
          type: number
          nullable: true
        wind_dir_prevailing:
          type: string
          nullable: true
        rain_total:
          type: number
          nullable: true
        hdd:
          type: number
          nullable: true
        cdd:
          type: number
          nullable: true

    ReportSummary:
      type: object
      properties:
        temp_avg:
          type: number
          nullable: true
        temp_max:
          type: number
          nullable: true
        temp_max_date:
          type: string
          nullable: true
        temp_min:
          type: number
          nullable: true
        temp_min_date:
          type: string
          nullable: true
        rain_total:
          type: number
          nullable: true
        rain_days:
          type: integer
          nullable: true
        wind_gust_max:
          type: number
          nullable: true
        wind_gust_max_date:
          type: string
          nullable: true
        wind_dir_prevailing:
          type: string
          nullable: true
        hdd_total:
          type: number
          nullable: true
        cdd_total:
          type: number
          nullable: true

    ClimateReport:
      type: object
      required: [station, period, rows, summary]
      properties:
        station:
          $ref: "#/components/schemas/StationInfo"
        period:
          $ref: "#/components/schemas/ReportPeriod"
        rows:
          type: array
          items:
            $ref: "#/components/schemas/ReportRow"
        summary:
          $ref: "#/components/schemas/ReportSummary"

    RecordEntry:
      type: object
      required: [value, date]
      properties:
        value:
          type: number
        date:
          type: string
          format: date

    RecordMetric:
      type: object
      required: [metric, label]
      properties:
        metric:
          type: string
        label:
          type: string
        this_month:
          oneOf:
            - $ref: "#/components/schemas/RecordEntry"
            - type: "null"
        this_year:
          oneOf:
            - $ref: "#/components/schemas/RecordEntry"
            - type: "null"
        all_time:
          oneOf:
            - $ref: "#/components/schemas/RecordEntry"
            - type: "null"

    RecordCategory:
      type: object
      required: [label, records]
      properties:
        label:
          type: string
        records:
          type: array
          items:
            $ref: "#/components/schemas/RecordMetric"

    RecordsResponse:
      type: object
      required: [station_id, days_of_data, categories]
      properties:
        station_id:
          type: string
        records_since:
          type: string
          format: date
          nullable: true
        days_of_data:
          type: integer
        categories:
          type: object
          additionalProperties:
            $ref: "#/components/schemas/RecordCategory"

    BrokenRecord:
      type: object
      required: [is_broken, current_value, previous_value, previous_date]
