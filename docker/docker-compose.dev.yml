services:
  timescaledb:
    ports:
      - "5433:5432"

  mosquitto:
    ports:
      - "1884:1883"

  backend-migrate:
    image: waffleweather-backend-dev
    build:
      context: ..
      dockerfile: docker/backend/Dockerfile
    volumes:
      - ../backend/alembic:/app/alembic

  backend:
    image: waffleweather-backend-dev
    build:
      context: ..
      dockerfile: docker/backend/Dockerfile
    volumes:
      - ../backend/app:/app/app
      - ../backend/alembic:/app/alembic
    environment:
      # Pin dev stack to the simulator's topic so real Ecowitt .env values
      # (WW_MQTT_TOPIC=Gateway) don't leak in and cause a subscribe/publish
      # mismatch. The simulator publishes on this topic; station_id = last
      # segment = "simulator".
      WW_MQTT_TOPIC: ecowitt2mqtt/simulator
    command: ["uv", "run", "uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]

  frontend:
    image: waffleweather-frontend-dev
    build:
      context: ..
      dockerfile: docker/frontend/Dockerfile
      target: dev
    volumes:
      - ../frontend/src:/app/src
      - ../frontend/public:/app/public
    command: ["sh", "-c", "pnpm generate && pnpm dev --hostname 0.0.0.0 --port 3000"]

  nginx:
    volumes:
      - ./nginx/nginx.dev.conf.template:/etc/nginx/templates/default.conf.template:ro

  seed:
    image: waffleweather-simulator-dev
    build:
      context: ..
      dockerfile: docker/simulator/Dockerfile
    depends_on:
      backend-migrate:
        condition: service_completed_successfully
    env_file: ./.env
    environment:
      WW_DATABASE_URL: postgresql+asyncpg://waffleweather:${WW_DB_PASSWORD}@timescaledb:5432/waffleweather
      WW_MQTT_TOPIC: ecowitt2mqtt/simulator
    entrypoint: ["sh", "/app/seed.sh"]
    volumes:
      - ../docker/simulator/seed.sh:/app/seed.sh:ro

  simulator:
    image: waffleweather-simulator-dev
    build:
      context: ..
      dockerfile: docker/simulator/Dockerfile
    depends_on:
      seed:
        condition: service_completed_successfully
      mosquitto:
        condition: service_started
    env_file: ./.env
    environment:
      WW_MQTT_BROKER: mosquitto
      WW_MQTT_TOPIC: ecowitt2mqtt/simulator
    command: ["simulate"]
